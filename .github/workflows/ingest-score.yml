name: Ingest score to GitHub leaderboard

on:
  issues:
    types: [opened, edited]

permissions:
  contents: write
  issues: write

jobs:
  ingest:
    # Labels from ?labels= may be ignored for non-collaborators,
    # so also accept issues whose title starts with "score:".
    if: >-
      startsWith(github.event.issue.title, 'score:') ||
      contains(join(github.event.issue.labels.*.name, ','), 'score')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Parse issue and update leaderboard
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'data/leaderboard.json';
            const issue = context.payload.issue;
            const body = issue.body || '';

            const match = body.match(/```(?:json)?\s*([\s\S]*?)```/i) || body.match(/\{[\s\S]*\}/);
            if (!match) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: '❌ Не найден JSON блока с результатом. Закрой issue и отправь счёт кнопкой «В GitHub» из игры.',
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
                state_reason: 'not_planned',
              });
              return;
            }

            let payload;
            try {
              payload = JSON.parse(match[1] || match[0]);
            } catch (err) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: '❌ JSON повреждён: `' + err.message + '`',
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
                state_reason: 'not_planned',
              });
              return;
            }

            const name = String(payload.name || 'Гость').trim().slice(0, 16) || 'Гость';
            const score = Number(payload.score);
            const maxTile = Number(payload.maxTile) || 0;
            const modeId = String(payload.modeId || '4').slice(0, 32);
            const modeLabel = String(payload.modeLabel || modeId).slice(0, 48);
            const auto = Boolean(payload.auto);
            const at = payload.at && !Number.isNaN(Date.parse(payload.at))
              ? new Date(payload.at).toISOString()
              : new Date().toISOString();

            if (!Number.isFinite(score) || score < 0 || score > 50_000_000) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: '❌ Счёт вне допустимого диапазона.',
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
                state_reason: 'not_planned',
              });
              return;
            }

            let board = { updatedAt: null, entries: [] };
            if (fs.existsSync(path)) {
              try { board = JSON.parse(fs.readFileSync(path, 'utf8')); } catch {}
            }
            if (!Array.isArray(board.entries)) board.entries = [];

            const entry = {
              id: `gh-${issue.number}`,
              name,
              score,
              maxTile,
              modeId,
              modeLabel,
              auto,
              at,
              githubUser: issue.user && issue.user.login ? issue.user.login : null,
              issueNumber: issue.number,
            };

            // replace previous submission from same issue number if edited
            board.entries = board.entries.filter((e) => e.issueNumber !== issue.number);
            board.entries.push(entry);
            board.entries.sort((a, b) => b.score - a.score || b.maxTile - a.maxTile || String(b.at).localeCompare(String(a.at)));
            board.entries = board.entries.slice(0, 200);
            board.updatedAt = new Date().toISOString();

            fs.mkdirSync('data', { recursive: true });
            fs.writeFileSync(path, JSON.stringify(board, null, 2) + '\n');

            const rank = board.entries.findIndex((e) => e.id === entry.id) + 1;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: `✅ Счёт **${score}** (${modeLabel}) сохранён в общий рейтинг.\nМесто сейчас: **#${rank}**.\nФайл: \`data/leaderboard.json\`.`,
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              state: 'closed',
              state_reason: 'completed',
            });

      - name: Commit leaderboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/leaderboard.json
          if git diff --cached --quiet; then
            echo "No leaderboard changes"
            exit 0
          fi
          git commit -m "Update GitHub leaderboard from #${{ github.event.issue.number }}"
          git push
